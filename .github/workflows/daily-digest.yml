name: Daily Email Digest

on:
  schedule:
    - cron: '0 12 * * *'  # 8:00 AM Eastern (EDT, UTC-4)
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest
        run: |
          curl -X POST https://email-digest-agent-eta.vercel.app/api/trigger
