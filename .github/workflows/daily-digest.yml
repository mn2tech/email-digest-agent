name: Daily Email Digest

on:
  schedule:
    - cron: '0 13 * * *'  # 8:00 AM Eastern (UTC-5)
  workflow_dispatch:        # allows manual trigger from GitHub

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest
        run: |
          curl -X POST https://email-digest-agent-eta.vercel.app/api/trigger
